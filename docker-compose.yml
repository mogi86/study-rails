# version: '3.8'  # この属性は廃止予定のため削除

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-study_rails_development}
      MYSQL_USER: ${MYSQL_USER:-rails}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - rails-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=mysql2://rails:password@db:3306/study_rails_development
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER:-rails}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-study_rails_development}
      - PATH=/usr/local/bundle/bin:$PATH
    depends_on:
      - db
    networks:
      - rails-network
    stdin_open: true
    tty: true

volumes:
  mysql_data:
  bundle_cache:

networks:
  rails-network:
    driver: bridge 